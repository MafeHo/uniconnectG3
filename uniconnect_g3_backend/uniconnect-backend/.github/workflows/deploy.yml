name: Uniconnect CD - Despliegue en Fly.io

on:
  push:
    branches: [ "main", "feature/auth-service-unit-tests", "actualizar-pruebas" ]

jobs:
  test:
    name: 1. Instalar dependencias, ejecutar pruebas y verificar cobertura
    runs-on: ubuntu-latest

    steps:
      - name: 1.1. Clonar el repositorio
        uses: actions/checkout@v4

      - name: 1.2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 1.3. Configurar Java (requerido para el emulador de Firebase)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: 1.4. Instalar todas las dependencias (Monorepo Workspaces)
        run: |
          npm ci

      - name: 1.5. Instalar Firebase Tools globalmente
        run: |
          npm install -g firebase-tools

      - name: 1.6. Ejecutar pruebas con reporte y validación estricta de cobertura
        env:
          NODE_ENV: test
          PORT: 3003
          BASE_URL: http://localhost:3001
          FIRESTORE_EMULATOR_HOST: localhost:8085
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          FIREBASE_PROJECT_ID: test-project
          GCLOUD_PROJECT: test-project
          GOOGLE_CLIENT_ID: mock-id
          GOOGLE_CLIENT_SECRET: mock-secret
          JWT_SECRET: qa_secret_key_123
          FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQ..."
          FIREBASE_CLIENT_EMAIL: test@example.com
        run: |
          npm run test:coverage

      - name: 1.7. Guardar y persistir reporte HTML de cobertura como artefacto
        if: always() # Asegura que se guarde el reporte incluso si los umbrales de cobertura fallan
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: coverage/
          retention-days: 14

